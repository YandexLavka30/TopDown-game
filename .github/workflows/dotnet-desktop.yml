name: Unity Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore NuGet packages
      run: dotnet restore TopDown-game.sln
      working-directory: .
    
    - name: Build C# scripts
      run: dotnet build TopDown-game.sln --configuration Release
      working-directory: .
      continue-on-error: false
    
    - name: Build success check
      run: |
        echo "========================================="
        echo "✅ Build completed successfully!"
        echo "========================================="
