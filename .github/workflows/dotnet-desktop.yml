name: Unity Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: List all files (debug)
      run: |
        Get-ChildItem -Path . -Recurse -File | Select-Object FullName
      shell: powershell
    
    - name: Find .sln file
      run: |
        $slnFile = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -First 1
        if ($slnFile) {
          Write-Host "Found solution: $($slnFile.FullName)"
          echo "SLN_PATH=$($slnFile.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
        } else {
          Write-Host "No .sln file found"
        }
      shell: powershell
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore NuGet packages
      run: |
        $slnFile = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -First 1
        if ($slnFile) {
          dotnet restore $slnFile.FullName
        }
      shell: powershell
    
    - name: Build C# scripts
      run: |
        $slnFile = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -First 1
        if ($slnFile) {
          dotnet build $slnFile.FullName --configuration Release
        }
      shell: powershell
    
    - name: Success
      run: Write-Host "✅ Build completed!"
      shell: powershell
